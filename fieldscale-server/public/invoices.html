<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fieldscale — Invoices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/fs-theme.css">
<style>
  .toolbar{display:flex;gap:8px;align-items:center;margin:0 0 18px}
  td.num,th.num{font-family:'IBM Plex Mono',monospace}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize}
  .pill.unpaid{background:rgba(192,57,43,.12);color:var(--danger)}
  .pill.partial{background:rgba(232,114,44,.15);color:var(--orange-dim)}
  .pill.paid{background:rgba(74,155,110,.15);color:var(--good)}
  .rowlink{cursor:pointer}
  .rowlink:hover td{background:#FbF9F3}
  .act{background:transparent;border:none;color:var(--steel);cursor:pointer;font-size:13px;padding:4px 8px;border-radius:var(--radius)}
  .act:hover{color:var(--danger);background:rgba(192,57,43,.08)}
  @media (max-width:680px){ .card{overflow-x:auto} table{min-width:620px} }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="mark"></span>FIELDSCALE</div>
  <nav>
    <a href="/">Takeoff</a>
    <a href="/proposals.html">Estimates</a>
    <a href="/invoices.html" class="active">Invoices</a>
    <a href="/estimates.html">Price Book</a>
    <a href="/company.html">Company</a>
    <a href="/admin.html" id="owner-nav">Owner</a>
  </nav>
  <div class="spacer"></div>
  <div class="who" id="who"></div>
  <a href="#" id="logout-link" style="color:var(--steel-light);font-size:13px;margin-left:14px;text-decoration:none">Log out</a>
</header>

<div class="wrap">
  <h1>Invoices</h1>
  <p class="sub">Bill your customers and track what's been paid. Create one here, or turn an estimate into an invoice from the estimate screen.</p>

  <div class="toolbar">
    <button class="btn primary" id="new-btn">＋ New Invoice</button>
  </div>

  <div id="loading" class="loading">Loading…</div>
  <div class="card" id="list-card" style="display:none">
    <table>
      <thead>
        <tr><th>Invoice</th><th>Client</th><th class="num">Total</th><th class="num">Paid</th><th class="num">Balance</th><th>Status</th><th>Updated</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN_STORAGE='fieldscale_token';
function getToken(){ return localStorage.getItem(TOKEN_STORAGE); }
document.addEventListener('click',function(e){ if(e.target && e.target.id==='logout-link'){ e.preventDefault(); localStorage.removeItem('fieldscale_token'); localStorage.removeItem('fieldscale_username'); location.href='/'; } });
if(!getToken()){ location.href='/'; }
async function apiFetch(path, options={}){
  const headers=Object.assign({'Content-Type':'application/json'}, options.headers||{});
  const t=getToken(); if(t) headers['Authorization']='Bearer '+t;
  const res=await fetch(path, Object.assign({}, options, {headers}));
  if(res.status===401){ location.href='/'; throw new Error('Session expired'); }
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}
function money(n){ return '$'+(Math.round((Number(n)||0)*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(ms){ if(!ms) return '—'; return new Date(ms).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastTimer; function toast(msg,isErr){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isErr?' err':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='toast',2200); }

document.getElementById('new-btn').addEventListener('click', async () => {
  try{
    const r = await apiFetch('/api/invoices', { method:'POST', body: JSON.stringify({ name:'Untitled Invoice' }) });
    location.href = '/invoice.html?id=' + encodeURIComponent(r.id);
  }catch(err){ toast(err.message, true); }
});

function render(list){
  const tb=document.getElementById('rows');
  if(!list.length){
    tb.innerHTML=`<tr><td colspan="8" style="padding:32px;text-align:center;color:var(--steel)">
      No invoices yet. Click <strong>＋ New Invoice</strong>, or convert an estimate from the estimate screen.</td></tr>`;
    return;
  }
  tb.innerHTML=list.map(i=>{
    const bal = (Number(i.total)||0) - (Number(i.amountPaid)||0);
    return `<tr class="rowlink" data-open="${i.id}">
      <td>${escapeHtml(i.name)}</td>
      <td class="muted">${escapeHtml(i.client)||'—'}</td>
      <td class="num">${money(i.total)}</td>
      <td class="num">${money(i.amountPaid)}</td>
      <td class="num">${money(bal)}</td>
      <td><span class="pill ${escapeHtml(i.status||'unpaid')}">${escapeHtml(i.status||'unpaid')}</span></td>
      <td class="muted">${fmtDate(i.updatedAt)}</td>
      <td class="num"><button class="act" data-del="${i.id}" title="Delete">✕</button></td>
    </tr>`;
  }).join('');
}
document.getElementById('rows').addEventListener('click', async (e) => {
  const del = e.target.getAttribute && e.target.getAttribute('data-del');
  if(del){ e.stopPropagation();
    if(!confirm('Delete this invoice permanently?')) return;
    try{ await apiFetch('/api/invoices/'+del, { method:'DELETE' }); load(); toast('Invoice deleted.'); }
    catch(err){ toast(err.message, true); }
    return;
  }
  const row = e.target.closest && e.target.closest('[data-open]');
  if(row){ location.href='/invoice.html?id='+encodeURIComponent(row.getAttribute('data-open')); }
});

async function load(){
  const list = await apiFetch('/api/invoices');
  document.getElementById('loading').style.display='none';
  document.getElementById('list-card').style.display='block';
  render(list);
}
async function init(){
  try{
    const me = await apiFetch('/api/me');
    document.getElementById('who').textContent = me.username;
  }catch(err){ return; }
  try{ await load(); }
  catch(err){ document.getElementById('loading').textContent='Could not load invoices: '+err.message; }
}
init();
</script>
</body>
</html>
