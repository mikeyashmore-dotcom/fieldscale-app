<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fieldscale — Job</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/fs-theme.css">
<style>
  .wrap{max-width:920px}
  .pagebar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .pagebar input.title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;border:none;border-bottom:1px solid var(--paper-line);background:transparent;width:320px;padding:4px 2px}
  .pagebar input.title:focus{border-bottom-color:var(--cyan-dim)}
  .pagebar .spacer{flex:1}
  .pagebar select{width:auto;padding:6px 8px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
  .block{background:#fff;border:1px solid var(--paper-line);border-radius:var(--radius);padding:14px}
  .block h3{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel);margin:0 0 10px}
  .field{margin-bottom:8px}
  .field label{display:block;font-size:12px;color:var(--steel);margin-bottom:3px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .lines td,.lines th{padding:8px 8px}
  .lines input[type=text],.lines input.num{padding:6px 7px}
  .done-cell{text-align:center;width:44px}
  .rowdel{background:transparent;border:none;color:var(--steel-light);cursor:pointer;font-size:15px;padding:2px 6px}
  .rowdel:hover{color:var(--danger)}
  textarea{min-height:90px;resize:vertical}
  .lines-scroll{overflow-x:auto}
  .costing{margin-bottom:18px}
  .cost-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
  .cost-grid input.num{width:100%;font-family:'IBM Plex Mono',monospace}
  .cost-out{display:flex;flex-wrap:wrap;gap:10px}
  .stat{flex:1;min-width:120px;background:var(--paper);border:1px solid var(--paper-line);border-radius:var(--radius);padding:10px 12px}
  .stat .lab{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--steel);margin-bottom:3px}
  .stat .num{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:var(--ink-navy)}
  .stat.good .num{color:var(--good)}
  .stat.bad .num{color:var(--danger)}
  .cost-hint{font-size:12px;color:var(--steel);margin:10px 0 0}
  @media (max-width:760px){ .grid2{grid-template-columns:1fr} .row2{grid-template-columns:1fr} .cost-grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="mark"></span>FIELDSCALE</div>
  <nav>
    <a href="/">Takeoff</a>
    <a href="/proposals.html">Estimates</a>
    <a href="/jobs.html" class="active">Jobs</a>
    <a href="/invoices.html">Invoices</a>
    <a href="/estimates.html">Price Book</a>
    <a href="/company.html">Company</a>
    <a href="/admin.html" id="owner-nav">Owner</a>
  </nav>
  <div class="spacer"></div>
  <div class="who" id="who"></div>
  <a href="#" id="logout-link" style="color:var(--steel-light);font-size:13px;margin-left:14px;text-decoration:none">Log out</a>
</header>

<div class="wrap">
  <div id="loading" class="loading">Loading…</div>
  <div id="content" style="display:none">
    <div class="pagebar">
      <a href="/jobs.html" class="btn ghost">← Jobs</a>
      <input class="title" id="job-name" placeholder="Job name" />
      <select id="status">
        <option value="scheduled">Scheduled</option>
        <option value="in progress">In progress</option>
        <option value="on hold">On hold</option>
        <option value="complete">Complete</option>
      </select>
      <div class="spacer"></div>
      <button class="btn ghost" id="to-invoice-btn" title="Bill this job">→ Invoice</button>
      <button class="btn primary" id="save-btn">Save</button>
    </div>

    <div class="grid2">
      <div class="block">
        <h3>Client</h3>
        <div class="field"><label>Client name</label><input id="cl-name" placeholder="Customer name" /></div>
        <div class="field"><label>Project / job</label><input id="project" /></div>
      </div>
      <div class="block">
        <h3>Schedule</h3>
        <div class="row2">
          <div class="field"><label>Start date</label><input id="start-date" type="date" /></div>
          <div class="field"><label>Due date</label><input id="due-date" type="date" /></div>
        </div>
      </div>
    </div>

    <div class="block costing">
      <h3>Job costing</h3>
      <div class="cost-grid">
        <div class="field"><label>Contract price</label><input id="c-contract" class="num" inputmode="decimal" placeholder="0.00" /></div>
        <div class="field"><label>Estimated cost (budget)</label><input id="c-budget" class="num" inputmode="decimal" placeholder="0.00" /></div>
        <div class="field"><label>Actual cost to date</label><input id="c-actual" class="num" inputmode="decimal" placeholder="0.00" /></div>
      </div>
      <div class="cost-out" id="cost-out"></div>
      <p class="cost-hint">Contract and budget carry over from the estimate. Log your real costs as the job runs to watch your margin.</p>
    </div>

    <div class="block" style="padding:0;overflow:hidden">
      <div class="lines-scroll">
        <table class="lines">
          <thead><tr><th>Scope of work</th><th>Code</th><th class="num">Qty</th><th>Unit</th><th class="done-cell">Done</th><th></th></tr></thead>
          <tbody id="lines"></tbody>
        </table>
      </div>
    </div>
    <div style="margin:10px 0 18px"><button class="btn ghost" id="add-blank">＋ Add scope line</button></div>

    <div class="block">
      <h3>Notes</h3>
      <textarea id="notes" placeholder="Job notes, instructions, materials to order…"></textarea>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN_STORAGE='fieldscale_token';
function getToken(){ return localStorage.getItem(TOKEN_STORAGE); }
document.addEventListener('click',function(e){ if(e.target && e.target.id==='logout-link'){ e.preventDefault(); localStorage.removeItem('fieldscale_token'); localStorage.removeItem('fieldscale_username'); location.href='/'; } });
if(!getToken()){ location.href='/'; }
const jobId = new URLSearchParams(location.search).get('id');
if(!jobId){ location.href='/jobs.html'; }
async function apiFetch(path, options={}){
  const headers=Object.assign({'Content-Type':'application/json'}, options.headers||{});
  const t=getToken(); if(t) headers['Authorization']='Bearer '+t;
  const res=await fetch(path, Object.assign({}, options, {headers}));
  if(res.status===401){ location.href='/'; throw new Error('Session expired'); }
  const data=await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ return '$'+(Math.round((Number(n)||0)*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function num(id){ return parseFloat(document.getElementById(id).value)||0; }
let toastTimer; function toast(m,e){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast show'+(e?' err':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='toast',2200); }

let doc = { client:{}, lines:[] };
let jobName='Untitled Job';

function renderLines(){
  const tb=document.getElementById('lines');
  if(!doc.lines.length){ tb.innerHTML=`<tr><td colspan="6" style="padding:22px;text-align:center;color:var(--steel)">No scope lines yet. Convert an estimate, or add lines below.</td></tr>`; return; }
  tb.innerHTML=doc.lines.map((l,i)=>`
    <tr>
      <td><input type="text" data-i="${i}" data-f="name" value="${escapeHtml(l.name)}" placeholder="What needs doing" /></td>
      <td><input type="text" data-i="${i}" data-f="code" value="${escapeHtml(l.code)}" style="width:120px" /></td>
      <td class="num"><input class="num" data-i="${i}" data-f="qty" value="${l.qty}" inputmode="decimal" style="width:74px" /></td>
      <td><input type="text" data-i="${i}" data-f="unit" value="${escapeHtml(l.unit)}" style="width:64px" /></td>
      <td class="done-cell"><input type="checkbox" data-i="${i}" data-f="done" ${l.done?'checked':''} /></td>
      <td class="num"><button class="rowdel" data-del="${i}" title="Remove">✕</button></td>
    </tr>`).join('');
}
document.getElementById('lines').addEventListener('input', e=>{
  const el=e.target, i=el.getAttribute('data-i'), f=el.getAttribute('data-f');
  if(i===null||i===undefined) return;
  if(f==='qty') doc.lines[i][f]=parseFloat(el.value)||0;
  else if(f==='done') doc.lines[i][f]=el.checked;
  else doc.lines[i][f]=el.value;
});
document.getElementById('lines').addEventListener('change', e=>{
  const el=e.target; if(el.getAttribute('data-f')==='done'){ doc.lines[el.getAttribute('data-i')].done=el.checked; }
});
document.getElementById('lines').addEventListener('click', e=>{
  const d=e.target.getAttribute && e.target.getAttribute('data-del');
  if(d!==null && d!==undefined){ doc.lines.splice(Number(d),1); renderLines(); }
});
document.getElementById('add-blank').addEventListener('click', ()=>{ doc.lines.push({ id:'l_'+Math.random().toString(16).slice(2,8), name:'', code:'', unit:'', qty:1, done:false }); renderLines(); });

function renderCosting(){
  const contract=num('c-contract'), budget=num('c-budget'), actual=num('c-actual');
  const estProfit=contract-budget;
  const estMargin=contract>0 ? (estProfit/contract*100) : 0;
  const actualProfit=contract-actual;
  const actualMargin=contract>0 ? (actualProfit/contract*100) : 0;
  const overUnder=budget-actual; // + = under budget, - = over
  const cls=v=> v>0?'good':(v<0?'bad':'');
  const stats=[
    ['Est. profit', money(estProfit), cls(estProfit)],
    ['Est. margin', (contract>0?estMargin.toFixed(1)+'%':'—'), cls(estProfit)],
    ['Profit so far', money(actualProfit), cls(actualProfit)],
    ['Margin so far', (contract>0?actualMargin.toFixed(1)+'%':'—'), cls(actualProfit)],
    [overUnder>=0?'Under budget':'Over budget', money(Math.abs(overUnder)), cls(overUnder)]
  ];
  document.getElementById('cost-out').innerHTML=stats.map(s=>`
    <div class="stat ${s[2]}"><div class="lab">${s[0]}</div><div class="num">${s[1]}</div></div>`).join('');
}
['c-contract','c-budget','c-actual'].forEach(id=>document.getElementById(id).addEventListener('input', renderCosting));

function val(id){ return document.getElementById(id).value; }
function set(id,v){ document.getElementById(id).value=(v==null?'':v); }
function syncDocFromForm(){
  jobName=val('job-name')||'Untitled Job';
  doc.client={ name:val('cl-name') }; doc.project=val('project');
  doc.startDate=val('start-date'); doc.dueDate=val('due-date'); doc.notes=val('notes');
  doc.company=doc.company||{}; doc.fromEstimateId=doc.fromEstimateId||'';
  doc.costing={ budget:num('c-budget'), contract:num('c-contract'), actualCost:num('c-actual') };
}
async function save(){
  syncDocFromForm();
  await apiFetch('/api/jobs/'+jobId, { method:'PUT', body: JSON.stringify({ name:jobName, client:doc.client.name, status:val('status'), doc }) });
}
document.getElementById('save-btn').addEventListener('click', async ()=>{ try{ await save(); toast('Job saved.'); }catch(err){ toast(err.message,true); } });
document.getElementById('to-invoice-btn').addEventListener('click', async ()=>{
  if(!doc.fromEstimateId){ toast('This job has no source estimate to bill from. Create the invoice from the estimate.', true); return; }
  if(!confirm('Create an invoice from this job’s estimate?')) return;
  try{ await save(); const r=await apiFetch('/api/invoices/from-estimate',{method:'POST',body:JSON.stringify({estimateId:doc.fromEstimateId})}); location.href='/invoice.html?id='+encodeURIComponent(r.id); }
  catch(err){ toast(err.message,true); }
});

function fillForm(){
  set('job-name',jobName);
  document.getElementById('status').value = statusVal;
  set('cl-name',(doc.client||{}).name); set('project',doc.project);
  set('start-date',doc.startDate); set('due-date',doc.dueDate); set('notes',doc.notes);
  const c=doc.costing||{};
  set('c-contract', c.contract!=null ? c.contract : '');
  set('c-budget', c.budget!=null ? c.budget : '');
  set('c-actual', c.actualCost!=null ? c.actualCost : '');
  renderCosting();
}
let statusVal='scheduled';
async function init(){
  try{ const me=await apiFetch('/api/me'); document.getElementById('who').textContent=me.username; }catch(e){ return; }
  try{
    const j = await apiFetch('/api/jobs/'+jobId);
    jobName = j.name || 'Untitled Job';
    statusVal = j.status || 'scheduled';
    doc = Object.assign({ client:{}, lines:[] }, j.doc||{});
    doc.client = doc.client||{}; doc.lines = doc.lines||[];
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    fillForm(); renderLines();
  }catch(err){ document.getElementById('loading').textContent='Could not load job: '+err.message; }
}
init();
</script>
</body>
</html>
